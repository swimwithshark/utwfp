<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund Performance Screener</title>
    <style>
        :root {
            --primary: #00704a;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 20px;
            background-color: #f1f5f9;
            color: var(--dark);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 { color: var(--primary); margin-top: 0; }
        
        /* Filters Section */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: var(--light);
            padding: 15px;
            border-radius: 6px;
        }
        .filter-btn {
            background: white;
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .search-box {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            flex-grow: 1;
            min-width: 200px;
        }

        /* Table Styling */
        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        th {
            background-color: var(--light);
            cursor: pointer;
            user-select: none;
            position: relative;
            white-space: nowrap;
        }
        th:hover { background-color: #e2e8f0; color: var(--primary); }
        th::after {
            content: ' ↕';
            font-size: 10px;
            color: #94a3b8;
        }
        tr:hover { background-color: #f8fafc; }
        .text-right { text-align: right; }
        .text-success { color: #16a34a; font-weight: 500; }
        .text-danger { color: #dc2626; font-weight: 500; }
        
        /* Badges */
        .badge {
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 4px;
            display: inline-block;
        }
        .badge-shariah { background: #e6f4ea; color: #137333; }
        .badge-prs { background: #feefe3; color: #b06000; }
        .badge-conv { background: #e8f0fe; color: #1a73e8; }
    </style>
</head>
<body>

<div class="container">
    <h2>Fund Performance Screener</h2>
    
    <div class="controls">
        <input type="text" id="search" class="search-box" placeholder="Search fund name...">
        <button class="filter-btn active" onclick="setFilter('all', this)">All Funds</button>
        <button class="filter-btn" onclick="setFilter('conventional', this)">Conventional</button>
        <button class="filter-btn" onclick="setFilter('shariah', this)">Shariah</button>
        <button class="filter-btn" onclick="setFilter('prs', this)">PRS</button>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th onclick="sortTable('name')">Fund Name</th>
                    <th onclick="sortTable('type')">Type</th>
                    <th class="text-right" onclick="sortTable('value')">Fund Value (M)</th>
                    <th class="text-right" onclick="sortTable('ytd')">YTD %</th>
                    <th class="text-right" onclick="sortTable('oneYear')">1 Yr %</th>
                    <th class="text-right" onclick="sortTable('threeYear')">3 Yr %</th>
                    <th class="text-right" onclick="sortTable('fiveYear')">5 Yr %</th>
                    <th onclick="sortTable('volatilityFactor')">Volatility (VF)</th>
                </tr>
            </thead>
            <tbody id="fund-table-body">
                <tr><td colspan="8" style="text-align: center; padding: 20px;">Loading data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let fundsData = [];
    let currentFilter = 'all';
    let sortDirection = false;
    let currentSortKey = '';

    // Fetch the JSON file generated by the Python script
    fetch('funds_data.json')
        .then(response => {
            if (!response.ok) throw new Error("Network response was not ok");
            return response.json();
        })
        .then(data => {
            fundsData = data;
            renderTable();
        })
        .catch(error => {
            console.error("Error loading fund data:", error);
            document.getElementById('fund-table-body').innerHTML = `
                <tr><td colspan="8" style="text-align: center; color: red; padding: 20px;">
                    Failed to load <b>funds_data.json</b>. Make sure the file exists in the same folder and you are running this through a local server or GitHub Pages.
                </td></tr>
            `;
        });

    function formatNumber(num, isPercentage = false) {
        if (num === null || num === undefined) return '<span style="color: #94a3b8;">N/A</span>';
        let formatted = num.toFixed(2);
        if (isPercentage) {
            let colorClass = num > 0 ? 'text-success' : (num < 0 ? 'text-danger' : '');
            return `<span class="${colorClass}">${formatted}%</span>`;
        }
        return formatted;
    }

    function renderTable() {
        const tbody = document.getElementById('fund-table-body');
        const searchTerm = document.getElementById('search').value.toLowerCase();
        
        const filtered = fundsData.filter(fund => {
            const matchesSearch = fund.name.toLowerCase().includes(searchTerm);
            if (!matchesSearch) return false;
            
            if (currentFilter === 'conventional') return fund.isConventional && !fund.isPRS;
            if (currentFilter === 'shariah') return fund.isShariah;
            if (currentFilter === 'prs') return fund.isPRS;
            return true;
        });

        tbody.innerHTML = filtered.map(fund => `
            <tr>
                <td><strong>${fund.name}</strong></td>
                <td>
                    ${fund.isShariah ? '<span class="badge badge-shariah">Shariah</span>' : '<span class="badge badge-conv">Conventional</span>'}
                    ${fund.isPRS ? '<span class="badge badge-prs">PRS</span>' : ''}
                </td>
                <td class="text-right">${formatNumber(fund.value)}</td>
                <td class="text-right">${formatNumber(fund.ytd, true)}</td>
                <td class="text-right">${formatNumber(fund.oneYear, true)}</td>
                <td class="text-right">${formatNumber(fund.threeYear, true)}</td>
                <td class="text-right">${formatNumber(fund.fiveYear, true)}</td>
                <td><small>${fund.volatilityClass !== 'N/A' ? fund.volatilityClass : 'N/A'} ${fund.volatilityFactor ? `(${fund.volatilityFactor})` : ''}</small></td>
            </tr>
        `).join('');
    }

    function setFilter(filterType, element) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        currentFilter = filterType;
        renderTable();
    }

    function sortTable(key) {
        sortDirection = (currentSortKey === key) ? !sortDirection : true;
        currentSortKey = key;

        fundsData.sort((a, b) => {
            let valA = a[key];
            let valB = b[key];
            
            // Treat nulls as the lowest possible value for sorting purposes
            if (valA === null) valA = -999999;
            if (valB === null) valB = -999999;

            if (key === 'type') {
                valA = a.isShariah ? 'Shariah' : 'Conventional';
                valB = b.isShariah ? 'Shariah' : 'Conventional';
            }

            if (valA < valB) return sortDirection ? -1 : 1;
            if (valA > valB) return sortDirection ? 1 : -1;
            return 0;
        });
        renderTable();
    }

    document.getElementById('search').addEventListener('input', renderTable);
</script>

</body>
</html>
